<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CarQuest4U | Find it. Finance it. Drive it.</title>
  <meta name="description" content="CarQuest4U in Orlando, FL." />
  <link rel="stylesheet" href="assets/style.css" />
</head>

<body>

<header class="topbar">
  <div class="wrap topbar__inner">

    <a class="brand" href="index.html">CarQuest<span>4u</span></a>

    <nav class="nav">
      <a href="index.html" data-nav="home">Home</a>
      <a href="inventory.html" data-nav="inventory">Inventory</a>
      <a href="contact.html" data-nav="contact">Contact</a>
    </nav>

    <div class="topbar__cta">
      <a class="pill" href="tel:+14077707324">📞 407-770-7324</a>
      <a class="pill" href="mailto:carquest4u@gmail.com">✉️ Email</a>
      <a class="pill pill--whatsapp" target="_blank" href="https://wa.me/14077707324">WhatsApp</a>
    </div>

  </div>
</header>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const page = location.pathname.split('/').pop() || 'index.html';
  const key = page.includes('inventory') ? 'inventory' :
              page.includes('contact') ? 'contact' : 'home';
  document.querySelectorAll('[data-nav]').forEach(a =>
    a.classList.toggle('is-active', a.dataset.nav === key)
  );
});
</script>

<main>

<section class="hero">
  <div class="wrap">
    <h1>Find it. Finance it. Drive it.</h1>
    <p class="muted">Orlando, FL • Monday–Friday 9–5pm • Financing • Delivery • Auction Assistance</p>
  </div>
</section>

<section class="section">
  <div class="wrap">
    <h2>Featured Cars</h2>
    <div class="grid" id="newestGrid"></div>
  </div>
</section>

</main>

<footer class="footer">
  <div class="wrap footer__bottom muted">
    © <span id="year"></span> CarQuest4U
  </div>
</footer>

<script src="assets/app.js"></script>

</body>
</html>
