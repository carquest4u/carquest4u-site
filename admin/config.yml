backend:
  name: github
  repo: REPLACE_WITH_YOUR_GITHUB_ORG_OR_USER/REPLACE_WITH_REPO
  branch: main

local_backend: true
publish_mode: editorial_workflow
media_folder: "assets/images"
public_folder: "/assets/images"

collections:
  - name: "inventory"
    label: "Inventory"
    files:
      - label: "Cars Data"
        name: "cars"
        file: "data/cars.json"
        format: "json"
        fields:
          - label: "Cars"
            name: "cars"
            widget: "list"
            summary: "{{fields.year}} {{fields.make}} {{fields.model}}"
            fields:
              - { label: "ID", name: "id", widget: "string" }
              - { label: "Featured", name: "featured", widget: "boolean", default: false }
              - { label: "Status", name: "status", widget: "string", required: false }
              - { label: "Year", name: "year", widget: "number", value_type: "int" }
              - { label: "Make", name: "make", widget: "string" }
              - { label: "Model", name: "model", widget: "string" }
              - { label: "Trim", name: "trim", widget: "string", required: false }
              - { label: "Price", name: "price", widget: "number", value_type: "int" }
              - { label: "Mileage", name: "mileage", widget: "number", value_type: "int" }
              - { label: "Transmission", name: "transmission", widget: "string", required: false }
              - { label: "Fuel", name: "fuel", widget: "string", required: false }
              - { label: "Body", name: "body", widget: "string", required: false }
              - { label: "Color", name: "color", widget: "string", required: false }
              - { label: "VIN", name: "vin", widget: "string", required: false }
              - { label: "Drivetrain", name: "drivetrain", widget: "string", required: false }
              - { label: "Title Status", name: "title_status", widget: "string", required: false }
              - { label: "Financing", name: "financing", widget: "boolean", default: true }
              - { label: "Description", name: "description", widget: "text", required: false }
              - label: "Images"
                name: "images"
                widget: "list"
                fields:
                  - { label: "Source", name: "src", widget: "image" }
                  - { label: "Focus (x% y%)", name: "focus", widget: "string", default: "50% 50%" }
